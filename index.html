// Converts an array-of-arrays (from XLSX sheet or pasted TSV) into normalized agenda rows.
// Shared by both the Excel-file path and the paste-data path.
function importRowsFromAOA(aoa) {
  if (!aoa || !aoa.length) throw new Error('Empty data');

  const headerIdx = findHeaderRow(aoa);
  const headerRow = aoa[headerIdx];
  const keyMap = buildKeyMap(headerRow);
  const dataRows = aoa.slice(headerIdx + 1).filter(r => r && r.some(c => c !== '' && c !== null && c !== undefined));

  if (!dataRows.length) throw new Error('No data rows found');

  const imported = dataRows.map((row, idx) => {
    const get = (field) => (keyMap[field] !== undefined ? row[keyMap[field]] : '');
    const namaRaw = String(get('namaKegiatan') || '').trim();
    if (!namaRaw) return null; // skip footnote/instruction/blank rows — not real agenda entries
    const tglMulaiRaw = get('tglMulai');
    const tglSelesaiRaw = get('tglSelesai');
    const tglMulai = parseAnyDate(tglMulaiRaw) || dayjs().format('YYYY-MM-DD');
    const tglSelesai = parseAnyDate(tglSelesaiRaw) || tglMulai;
    return {
      id: uid('IMP'),
      no: Number(get('no')) || idx + 1,
      tglMulai, tglSelesai,
      waktu: String(get('waktu') || ''),
      namaKegiatan: namaRaw,
      layanan: normalizeLayanan(get('layanan')),
      unitPemohon: String(get('unitPemohon') || '-'),
      undangan: String(get('undangan') || ''),
      suratTugas: String(get('suratTugas') || ''),
      kategori: String(get('kategori') || 'Lainnya'),
      programTerkait: String(get('programTerkait') || '-'),
      tujuanOutput: String(get('tujuanOutput') || ''),
      materi: String(get('materi') || ''),
      unitAsalNarsum: String(get('unitAsalNarsum') || ''),
      pesertaTarget: String(get('pesertaTarget') || ''),
      picTimCM: String(get('picTimCM') || ''),
      lokasiChannel: String(get('lokasiChannel') || ''),
      estimasiBiaya: Number(get('estimasiBiaya')) || 0,
      status: String(get('status') || ''),
      catatan: String(get('catatan') || ''),
    };
  }).filter(Boolean);

  if (!imported.length) throw new Error('No valid agenda rows found (all rows are blank or notes/instructions)');
  return imported;
}

function processExcelFile(file, onDone) {
  const done = () => { if (onDone) onDone(); };

  showLoading('Reading Excel file...');
  // Safety-net: force-hide loading no matter what happens (prevents infinite spinner)
  const safetyTimer = setTimeout(() => {
    hideLoading();
    toast('File reading took too long and was stopped.', 'error');
    done();
  }, 15000);

  setTimeout(() => {
    const reader = new FileReader();
    reader.onerror = function () {
      clearTimeout(safetyTimer);
      hideLoading();
      done();
      toast('Failed to read file. Please try again.', 'error');
    };
    reader.onload = function (e) {
      try {
        const bytes = new Uint8Array(e.target.result);
        const workbook = XLSX.read(bytes, { type: 'array', cellDates: true, cellStyles: false, cellHTML: false, cellFormula: false });
        const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('master')) || workbook.SheetNames[0];
        const ws = workbook.Sheets[sheetName];
        const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: true });

        const imported = importRowsFromAOA(aoa);

        clearTimeout(safetyTimer);
        hideLoading();
        done();
        finalizeImport(imported, `sheet "${sheetName}"`);
      } catch (err) {
        console.error(err);
        clearTimeout(safetyTimer);
        hideLoading();
        done();
        toast('Failed to read file: ' + (err.message || 'unrecognized format'), 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  }, 60);
}

// Import via pasted text (copy range in Excel -> Ctrl+C -> paste here).
// Uses no File APIs at all, so it works even where file pickers/drag-drop are restricted.
function processPastedData(text) {
  if (!text || !text.trim()) { toast('No data pasted yet', 'error'); return; }

  showLoading('Processing pasted data...');
  const safetyTimer = setTimeout(() => {
    hideLoading();
    toast('Processing took too long and was stopped.', 'error');
  }, 15000);

  setTimeout(() => {
    try {
      const rawLines = text.replace(/\r/g, '').split('\n');
      const aoa = [];
      rawLines.forEach(line => {
        if (!line && aoa.length === 0) return; // skip leading blank lines
        const cells = line.split('\t');
        const firstCell = (cells[0] || '').trim();
        // A row is treated as a genuine new row only if its first cell looks like a row number.
        // Anything else (while we already have a row started) is a continuation of a multi-line
        // cell — e.g. a numbered list inside "Tujuan/Output" — whose internal line break survived
        // the copy from Excel. The remaining tab-separated cells on that continuation line are the
        // TRUE subsequent columns of the row (materi, PIC, dst), so they must be re-appended as
        // separate cells, not swallowed as raw text.
        const looksLikeNewRow = /^\d+$/.test(firstCell) || aoa.length === 0;
        if (looksLikeNewRow) {
          aoa.push(cells);
        } else {
          const prevRow = aoa[aoa.length - 1];
          const lastIdx = prevRow.length - 1;
          prevRow[lastIdx] = (prevRow[lastIdx] || '') + '\n' + (cells[0] || '');
          for (let i = 1; i < cells.length; i++) prevRow.push(cells[i]);
        }
      });
      const imported = importRowsFromAOA(aoa);
      clearTimeout(safetyTimer);
      hideLoading();
      finalizeImport(imported, 'pasted data');
    } catch (err) {
      console.error(err);
      clearTimeout(safetyTimer);
      hideLoading();
      toast('Failed to process data: ' + (err.message || 'unrecognized format'), 'error');
    }
  }, 60);
}

/* ============================================================
   CONTACT — IMPORT / EXPORT (multi-sheet Excel aware)
   Mirrors the source workbook layout: one sheet per team, title in
   row 1, header row with "Squad Team" / "Nama" etc, detected by
   fuzzy keyword matching so column order/position can vary.
============================================================ */
const CONTACT_FIELD_MATCHERS = [
  ['squadTeam', ['squad team', 'squad']],
  ['unitEselonI', ['unit eselon', 'unit']],
  ['nama', ['nama']],
  ['nip', ['nip']],
  ['jabatan', ['jabatan']],
  ['peran', ['peran', 'role']],
];
function findContactHeaderRow(aoa) {
  const scanRows = Math.min(aoa.length, 8);
  for (let i = 0; i < scanRows; i++) {
    const row = (aoa[i] || []).map(c => String(c || '').toLowerCase());
    const rowStr = row.join('|');
    let hits = 0;
    ['squad', 'nama', 'peran', 'jabatan'].forEach(k => { if (rowStr.includes(k)) hits++; });
    if (hits >= 2) return i;
  }
  return -1;
}
function buildContactKeyMap(headerRow) {
  const headers = headerRow.map(h => String(h || '').toLowerCase().trim());
  const map = {};
  const usedCols = new Set();
  CONTACT_FIELD_MATCHERS.forEach(([field, patterns]) => {
    let bestCol = -1;
    for (let c = 0; c < headers.length; c++) {
      if (usedCols.has(c)) continue;
      if (patterns.some(p => headers[c].includes(p))) { bestCol = c; break; }
    }
    if (bestCol > -1) { map[field] = bestCol; usedCols.add(bestCol); }
  });
  return map;
}
// Converts one sheet's array-of-arrays into contact rows for that sheet.
function importContactsFromSheet(sheetName, aoa) {
  if (!aoa || !aoa.length) return [];
  const sheetTitle = String((aoa[0] && aoa[0][0]) || sheetName).trim();
  const headerIdx = findContactHeaderRow(aoa);
  if (headerIdx === -1) return [];
  const keyMap = buildContactKeyMap(aoa[headerIdx]);
  if (keyMap.nama === undefined) return [];
  const dataRows = aoa.slice(headerIdx + 1).filter(r => r && r.some(c => c !== '' && c !== null && c !== undefined));
  const get = (row, field) => (keyMap[field] !== undefined ? row[keyMap[field]] : '');
  return dataRows.map(row => {
    const nama = String(get(row, 'nama') || '').trim();
    if (!nama) return null;
    let nip = get(row, 'nip');
    nip = nip === null || nip === undefined ? '' : String(nip).trim();
    if (nip.endsWith('.0')) nip = nip.slice(0, -2);
    return {
      sheet: sheetName,
      sheetTitle,
      squadTeam: String(get(row, 'squadTeam') || '-').trim(),
      unitEselonI: String(get(row, 'unitEselonI') || '-').trim(),
      nama,
      nip,
      jabatan: String(get(row, 'jabatan') || '').trim(),
      peran: String(get(row, 'peran') || '').trim(),
    };
  }).filter(Boolean);
}

function processContactExcelFile(file, onDone) {
  const done = () => { if (onDone) onDone(); };
  showLoading('Reading Excel file...');
  const safetyTimer = setTimeout(() => {
    hideLoading();
    toast('File reading took too long and was stopped.', 'error');

  setTimeout(() => {

      clearTimeout(safetyTimer);
      hideLoading();

        console.error(err);
        clearTimeout(safetyTimer);
        hideLoading();
        done();

/* ============================================================
   TEXT CODE BACKUP/RESTORE — a copy/paste-friendly alternative to
   the JSON file, for channels where sending a file is awkward
   (WhatsApp "Message yourself", Notes app, email body, etc).
   Data is compressed (LZ-String) and split into numbered parts
   tagged "CMDB1:n/total:...", mirroring how long text codes are
   commonly shared in chat apps.
============================================================ */
const TEXT_CODE_PREFIX = 'CMDB1';
const TEXT_CODE_CHUNK_SIZE = 1800;
function generateTextCodeChunks(payload) {
  const json = JSON.stringify(payload);
  const compressed = LZString.compressToBase64(json);
  const total = Math.max(1, Math.ceil(compressed.length / TEXT_CODE_CHUNK_SIZE));
  const chunks = [];
  for (let i = 0; i < total; i++) {
    const part = compressed.slice(i * TEXT_CODE_CHUNK_SIZE, (i + 1) * TEXT_CODE_CHUNK_SIZE);
    chunks.push(`${TEXT_CODE_PREFIX}:${i + 1}/${total}:${part}`);
  }
  return chunks;
}
function parseTextCodeChunks(text) {
  const re = new RegExp(TEXT_CODE_PREFIX + ':(\\d+)/(\\d+):([A-Za-z0-9+/=]+)', 'g');
  const found = new Map();
  let total = null;
  let m;
  while ((m = re.exec(text)) !== null) {
    const idx = Number(m[1]);
    const tot = Number(m[2]);
    const data = m[3].replace(/[^A-Za-z0-9+/=]/g, '');
    if (!data) continue;
    if (total === null) total = tot;
    found.set(idx, data);
  }
  if (!total) return { error: 'No valid backup code parts found. Make sure you pasted the CMDB1:... block(s).' };
  const missing = [];
  let combined = '';
  for (let i = 1; i <= total; i++) {
    if (!found.has(i)) { missing.push(i); continue; }
    combined += found.get(i);
  }
  if (missing.length) return { error: `Missing part(s) ${missing.join(', ')} of ${total}. Paste all the parts (in any order) and try again.` };
  try {
    const json = LZString.decompressFromBase64(combined);
    if (!json) return { error: 'Could not decode this backup code — it may be corrupted or incomplete.' };
    const parsed = JSON.parse(json);
    return { data: parsed };
  } catch (e) {
    return { error: 'Could not decode this backup code: ' + (e.message || 'invalid format') };
  }
}
function copyTextToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  ta.remove();
  return Promise.resolve();
}

    if (!document.getElementById('chkIncludeKnowledge').checked) delete payload.knowledge;

    const chunks = generateTextCodeChunks(payload);
    const totalChars = chunks.reduce((s, c) => s + c.length, 0);
    const out = document.getElementById('textCodeOutput');
    const WHATSAPP_LIMIT = 65000;
    const warningHtml = totalChars > WHATSAPP_LIMIT
      ? `<p style="font-size:12px;color:var(--ink-700);background:var(--amber-bg);padding:10px 12px;border-radius:9px;margin:0 0 12px;line-height:1.5;">⚠ This code is ${totalChars.toLocaleString()} characters — longer than a single WhatsApp message can hold (~65,000). "Copy All Parts" will still copy everything at once, but you'll need to paste it somewhere without that limit — Notes, Google Keep/Docs, or an email draft — instead of one WhatsApp message. Or uncheck Squad Team above for a much shorter code.</p>`
      : `<p style="font-size:12px;color:var(--ink-700);background:var(--green-bg);padding:10px 12px;border-radius:9px;margin:0 0 12px;line-height:1.5;">✔ This code is ${totalChars.toLocaleString()} characters — short enough to paste as a single WhatsApp message using "Copy All Parts" below.</p>`;
    out.innerHTML = warningHtml + chunks.map((c, i) => `
      <div style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:11.5px;font-weight:700;color:var(--ink-500);">Part ${i + 1} of ${chunks.length}</span>
          <button type="button" class="btn btn-outline btn-sm copy-chunk-btn" data-idx="${i}" style="padding:3px 10px;">Copy</button>
        </div>
        <textarea readonly class="mono" style="width:100%;min-height:90px;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:11px;background:var(--bg);color:var(--ink-700);resize:vertical;">${escapeHtml(c)}</textarea>
      </div>`).join('') + `<button type="button" class="btn btn-outline btn-sm" id="btnCopyAllChunks" style="margin-top:2px;">Copy All Parts (paste as one message/note)</button>`;
    out.querySelectorAll('.copy-chunk-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        copyTextToClipboard(chunks[Number(btn.dataset.idx)]);
        toast(`Part ${Number(btn.dataset.idx) + 1} copied`, 'success');
      });
    });
    document.getElementById('btnCopyAllChunks').addEventListener('click', () => {
      copyTextToClipboard(chunks.join('\n\n'));
      toast('All parts copied', 'success');
    });
  });
}

function openRestoreOptionsModal() {
  const modal = document.getElementById('backupModal');
  modal.innerHTML = `<div class="modal-box">
    <div class="modal-head"><h2>Restore All Data</h2><button class="modal-close" id="closeRestoreOptions">&times;</button></div>
    <div class="modal-body">
      <div style="display:flex;gap:6px;margin-bottom:16px;background:var(--bg);padding:5px;border-radius:10px;">
        <button class="btn btn-sm" id="restoreTabFile" style="flex:1;justify-content:center;background:var(--navy-800);color:#fff;">Upload File</button>
        <button class="btn btn-sm btn-outline" id="restoreTabText" style="flex:1;justify-content:center;">Text Code</button>
      </div>
      <div id="restorePaneFile">
        <div class="drop-zone" id="restoreDropZone">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          <div class="drop-zone-title">Drag &amp; drop backup file here</div>
          <div class="drop-zone-sub">or <span class="drop-zone-browse" id="restoreBrowseTrigger">click to choose a file</span> (.json)</div>
        </div>
      </div>
      <div id="restorePaneText" class="hidden">
        <p style="font-size:12.5px;color:var(--ink-700);line-height:1.6;margin:0 0 10px;">Paste all the text-code part(s) you copied earlier (from WhatsApp, Notes, etc) below — any order is fine, just make sure every part is included.</p>
        <textarea id="restoreTextArea" placeholder="Paste CMDB1:... part(s) here..." style="width:100%;min-height:160px;border:2px dashed var(--border);border-radius:12px;padding:14px;font-size:12px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--ink-900);resize:vertical;"></textarea>
        <button class="btn btn-gold btn-sm" id="btnProcessTextCode" style="margin-top:10px;">Process Text Code</button>
      </div>
    </div>
  </div>`;
  modal.classList.remove('hidden');
  const close = () => modal.classList.add('hidden');
  document.getElementById('closeRestoreOptions').addEventListener('click', close);
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

  const tabFile = document.getElementById('restoreTabFile');
  const tabText = document.getElementById('restoreTabText');
  const paneFile = document.getElementById('restorePaneFile');
  const paneText = document.getElementById('restorePaneText');
  tabFile.addEventListener('click', () => {
    tabFile.className = 'btn btn-sm'; tabFile.style.cssText = 'flex:1;justify-content:center;background:var(--navy-800);color:#fff;';
    tabText.className = 'btn btn-sm btn-outline'; tabText.style.cssText = 'flex:1;justify-content:center;';
    paneFile.classList.remove('hidden'); paneText.classList.add('hidden');
  });
  tabText.addEventListener('click', () => {
    tabText.className = 'btn btn-sm'; tabText.style.cssText = 'flex:1;justify-content:center;background:var(--navy-800);color:#fff;';
    tabFile.className = 'btn btn-sm btn-outline'; tabFile.style.cssText = 'flex:1;justify-content:center;';
    paneText.classList.remove('hidden'); paneFile.classList.add('hidden');
  });

  const dropZone = document.getElementById('restoreDropZone');
  document.getElementById('restoreBrowseTrigger').addEventListener('click', () => {
    document.getElementById('backupFileInputLabel').click();
  });
  dropZone.addEventListener('click', (e) => {
    if (e.target.id === 'restoreBrowseTrigger') return;
    document.getElementById('backupFileInputLabel').click();
  });
  ['dragenter', 'dragover'].forEach(evt => {
    dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add('drag-over'); });
  });
  ['dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('drag-over'); });
  });
  dropZone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    if (!/\.json$/i.test(file.name)) { toast('File format must be .json', 'error'); return; }
    close();
    const fakeEvent = { target: { files: [file], value: '' } };
    handleBackupFileUpload(fakeEvent);
  });

  document.getElementById('btnProcessTextCode').addEventListener('click', () => {
    const text = document.getElementById('restoreTextArea').value;
    if (!text.trim()) { toast('Paste the text code first', 'error'); return; }
    const result = parseTextCodeChunks(text);
    if (result.error) { toast(result.error, 'error'); return; }
    close();
    openRestoreConfirm(result.data, 'Text Code');
  });
}

function openRestoreConfirm(parsed, sourceLabel) {
  const hasAgendas = Array.isArray(parsed.agendas);
  const hasKnowledge = Array.isArray(parsed.knowledge);
  const hasContacts = Array.isArray(parsed.contacts);
  const nAgendas = hasAgendas ? parsed.agendas.length : 0;
  const nKnowledge = hasKnowledge ? parsed.knowledge.reduce((s, g) => s + (g.items ? g.items.length : 0), 0) : 0;
  const nContacts = hasContacts ? parsed.contacts.length : 0;
  const exportedAt = parsed.exportedAt ? dayjs(parsed.exportedAt).format('D MMM YYYY, HH:mm') : 'unknown time';
  const rowBadge = (has, n) => has ? `<span class="count-badge">${n}</span>` : `<span class="count-badge" style="background:var(--gray-bg);color:var(--ink-300);">not included</span>`;
  const modal = document.getElementById('backupModal');
  modal.innerHTML = `<div class="modal-box small">
    <div class="modal-head"><h2>Restore Data?</h2><button class="modal-close" id="closeRestoreConfirm">&times;</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--ink-500);margin:0 0 12px;">Backup file: <strong>${escapeHtml(sourceLabel)}</strong> — created ${escapeHtml(exportedAt)}</p>
      <div class="kpi-list" style="margin-bottom:12px;">
        <div class="kpi-list-row" style="cursor:default;"><span class="kpi-list-title" style="flex:1;">Activities</span>${rowBadge(hasAgendas, nAgendas)}</div>
        <div class="kpi-list-row" style="cursor:default;"><span class="kpi-list-title" style="flex:1;">Knowledge links</span>${rowBadge(hasKnowledge, nKnowledge)}</div>
        <div class="kpi-list-row" style="cursor:default;"><span class="kpi-list-title" style="flex:1;">Squad Team members</span>${rowBadge(hasContacts, nContacts)}</div>
      </div>
      <p style="font-size:12.5px;color:var(--ink-700);background:var(--amber-bg);padding:10px 12px;border-radius:9px;line-height:1.5;">⚠ This will <strong>fully replace</strong> the data shown above with counts. Anything marked "not included" was left out of this particular backup and will <strong>stay untouched</strong> in this browser.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline btn-sm" id="cancelRestoreConfirm">Cancel</button>
      <button class="btn btn-gold btn-sm" id="confirmRestoreBtn">Yes, Restore</button>
    </div>
  </div>`;
  modal.classList.remove('hidden');
  const close = () => modal.classList.add('hidden');
  document.getElementById('closeRestoreConfirm').addEventListener('click', close);
  document.getElementById('cancelRestoreConfirm').addEventListener('click', close);
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
  document.getElementById('confirmRestoreBtn').addEventListener('click', async () => {
    close();
    await applyFullRestore(parsed);
  });
}

async function applyFullRestore(parsed) {
  showLoading('Restoring data...');
  if (Array.isArray(parsed.agendas)) {
    state.agendas = preprocess(parsed.agendas);
  }
  if (Array.isArray(parsed.knowledge)) {
    state.knowledge = parsed.knowledge.length ? parsed.knowledge : JSON.parse(JSON.stringify(KNOWLEDGE_DEFAULT_GROUPS));
  }
  if (Array.isArray(parsed.contacts)) {
    state.contacts = normalizeContactList(parsed.contacts);
  }
  state.page = 1;
  await persist();
  await persistKnowledge();
  await persistContacts();
  hideLoading();
  refreshAll();
  renderKnowledge();
  populateContactFilterDropdowns();
  renderContactResults();
  toast('Data restored successfully', 'success');
}



/* ============================================================
   EVENT WIRING
============================================================ */
function wireEvents() {
  document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { state.filters.search = e.target.value; state.page = 1; renderActiveTab(); }, 180);
  });
  document.getElementById('filterKategori').addEventListener('change', (e) => { state.filters.kategori = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterProgram').addEventListener('change', (e) => { state.filters.program = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterStatus').addEventListener('change', (e) => { state.filters.status = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterPic').addEventListener('change', (e) => { state.filters.pic = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterUnit').addEventListener('change', (e) => { state.filters.unit = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterLayanan').addEventListener('change', (e) => { state.filters.layanan = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterDateFrom').addEventListener('change', (e) => { state.filters.dateFrom = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('filterDateTo').addEventListener('change', (e) => { state.filters.dateTo = e.target.value; state.page = 1; refreshAll(); });
  document.getElementById('btnResetFilter').addEventListener('click', () => {
    state.filters = { search:'', kategori:'ALL', program:'ALL', status:'ALL', pic:'ALL', unit:'ALL', layanan:'ALL', dateFrom:'', dateTo:'' };
    document.getElementById('searchInput').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    refreshAll();
  });

  document.getElementById('btnAdd').addEventListener('click', () => openForm(null));
  document.getElementById('btnImport').addEventListener('click', openImportModal);
  document.getElementById('fileInput').addEventListener('change', handleFileUpload);
  document.getElementById('contactFileInput').addEventListener('change', handleContactFileUpload);
  document.getElementById('btnBackupAll').addEventListener('click', openBackupOptionsModal);
  document.getElementById('btnRestoreAll').addEventListener('click', openRestoreOptionsModal);
  document.getElementById('backupFileInput').addEventListener('change', handleBackupFileUpload);
  document.getElementById('btnExport').addEventListener('click', exportToExcel);
}

/* ============================================================
   INIT
============================================================ */
(async function init() {
  wireEvents();
  await loadInitial();
  await loadLastImportDisplay();
  await loadLastUpdateDisplayInitial();
  await loadKnowledgeInitial();
  await loadContactsInitial();
  populateFilterDropdowns();
  refreshAll();
})();

</script>
