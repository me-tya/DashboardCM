<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM Team Agenda Dashboard — Pusmantap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/locale/id.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
:root{
  --navy-900:#0B1B3D;
  --navy-800:#12275A;
  --navy-700:#1B3A73;
  --navy-600:#254A8C;
  --gold-500:#C8A84B;
  --gold-400:#DEC079;
  --gold-100:#F6EFDC;
  --bg:#F3F5FA;
  --surface:#FFFFFF;
  --ink-900:#141B2E;
  --ink-700:#333E58;
  --ink-500:#5D6785;
  --ink-300:#9AA3BD;
  --border:#E3E7F1;
  --border-soft:#EDF0F7;
  --green:#15916F;
  --green-bg:#E4F5EF;
  --blue:#2F6FCE;
  --blue-bg:#E7EFFC;
  --amber:#B87A12;
  --amber-bg:#FBF0DC;
  --red:#C13B3B;
  --red-bg:#FBE9E9;
  --purple:#6D53C7;
  --purple-bg:#EDE9FB;
  --pink:#C3488B;
  --pink-bg:#FBE7F1;
  --teal:#188A8A;
  --teal-bg:#E1F3F3;
  --gray:#6B7284;
  --gray-bg:#EEF0F4;
  --shadow-sm:0 1px 2px rgba(15,25,60,.06);
  --shadow-md:0 6px 20px rgba(15,25,60,.08);
  --shadow-lg:0 16px 40px rgba(15,25,60,.14);
  --radius:14px;
  --radius-sm:9px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink-900);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Sora',sans-serif;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#C7CEDF;border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#A9B2C9;}
.hidden{display:none !important;}

/* ===== HEADER ===== */
header.topbar{
  background:linear-gradient(120deg,var(--navy-900) 0%, var(--navy-700) 100%);
  color:#fff;
  padding:18px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:sticky;
  top:0;
  z-index:40;
  box-shadow:var(--shadow-md);
  flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold-500),var(--gold-400));
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:var(--navy-900);
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(200,168,75,.35);
}
.brand-text h1{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin:0;letter-spacing:.2px;}
.brand-text p{margin:2px 0 0;font-size:12.5px;color:#B9C3E0;}
.topbar-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.btn{
  border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  font-family:'Inter',sans-serif;transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(.96);}
.btn-gold{background:var(--gold-500);color:var(--navy-900);}
.btn-gold:hover{background:var(--gold-400);}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);}
.btn-ghost:hover{background:rgba(255,255,255,.18);}
.btn-outline{background:#fff;color:var(--navy-800);border:1px solid var(--border);}
.btn-outline:hover{background:var(--gold-100);border-color:var(--gold-400);}
.btn-danger{background:var(--red-bg);color:var(--red);}
.btn-danger:hover{background:#f6d5d5;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.icon{width:15px;height:15px;flex-shrink:0;}
.storage-pill{
  display:flex;align-items:center;gap:6px;font-size:11.5px;color:#B9C3E0;
  background:rgba(255,255,255,.08);padding:6px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.14);
}
.dot{width:7px;height:7px;border-radius:50%;background:#3CCB8F;flex-shrink:0;}
.dot.saving{background:var(--gold-400);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.last-sync-pill{
  font-size:11.5px;color:#B9C3E0;background:rgba(255,255,255,.08);padding:6px 11px;border-radius:20px;
  border:1px solid rgba(255,255,255,.14);white-space:nowrap;
}
.last-sync-pill span{color:#fff;font-weight:600;}
.topbar-divider{width:1px;align-self:stretch;background:rgba(255,255,255,.16);margin:2px 2px;}

/* ===== LAYOUT ===== */
main.content{max-width:1440px;margin:0 auto;padding:22px 28px 60px;}

/* ===== KPI ===== */
.kpi-grid{display:flex;gap:12px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;}
.kpi-card{
  flex:1 1 150px;min-width:148px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;position:relative;box-shadow:var(--shadow-sm);
  border-left:4px solid var(--accent-color, var(--navy-700));
  transition:transform .15s ease, box-shadow .15s ease;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.kpi-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.kpi-card .kpi-icon{
  width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.kpi-card .kpi-icon svg{width:14px;height:14px;}
.kpi-label{font-size:10.5px;color:var(--ink-500);font-weight:600;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.kpi-value{font-family:'Sora',sans-serif;font-size:21px;font-weight:700;color:var(--ink-900);line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--ink-500);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ===== FILTER BAR ===== */
.filter-bar{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:18px;box-shadow:var(--shadow-sm);
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.search-wrap{position:relative;flex:1 1 240px;min-width:200px;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:9px;
  font-size:13px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink-900);
}
.search-wrap input:focus{outline:2px solid var(--navy-600);outline-offset:-1px;background:#fff;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-300);}
select.filter-select, input.filter-date{
  padding:9px 10px;border:1px solid var(--border);border-radius:9px;font-size:12.5px;
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink-700);cursor:pointer;min-width:130px;
}
input.filter-date{cursor:default;min-width:128px;}
.filter-date-sep{font-size:12px;color:var(--ink-300);}
select.filter-select:focus, input.filter-date:focus{outline:2px solid var(--navy-600);outline-offset:-1px;}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:6px;margin-bottom:18px;padding:6px;overflow-x:auto;
  background:var(--surface);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow-sm);
}
.tab-btn{
  padding:10px 18px;font-size:13px;font-weight:700;color:var(--ink-500);background:transparent;border:none;
  cursor:pointer;border-radius:9px;display:flex;align-items:center;gap:8px;white-space:nowrap;
  font-family:'Inter',sans-serif;transition:background .15s ease,color .15s ease,transform .1s ease;
}
.tab-btn:hover{color:var(--navy-800);background:var(--gold-100);}
.tab-btn:active{transform:scale(.97);}
.tab-btn.active{
  color:#fff;background:linear-gradient(120deg,var(--navy-800) 0%,var(--navy-600) 100%);
  box-shadow:0 4px 12px rgba(18,39,90,.32);
}
.tab-btn.active:hover{background:linear-gradient(120deg,var(--navy-800) 0%,var(--navy-600) 100%);}
.count-badge{background:var(--gray-bg);color:var(--ink-500);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap;}
.tab-btn .count-badge{background:var(--gray-bg);color:var(--ink-500);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;}
.tab-btn.active .count-badge{background:rgba(255,255,255,.24);color:#fff;}
.tab-icon{width:15px;height:15px;flex-shrink:0;opacity:.85;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.tab-panel{animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== BADGES (T-House categories) ===== */
.cat-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;
  font-size:11.5px;font-weight:600;white-space:nowrap;
}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
.unit-badge{
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:7px;
  font-size:11.5px;font-weight:700;white-space:nowrap;background:var(--navy-800);color:#fff;
  letter-spacing:.02em;
}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px;}
table.data-table thead th{
  text-align:left;padding:11px 14px;background:var(--bg);color:var(--ink-500);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;
}
table.data-table thead th:hover{color:var(--navy-800);}
table.data-table thead th .sort-ind{margin-left:4px;color:var(--ink-300);font-size:10px;}
table.data-table tbody td{padding:12px 14px;border-bottom:1px solid var(--border-soft);vertical-align:top;color:var(--ink-700);}
table.data-table tbody tr{cursor:pointer;transition:background .1s;}
table.data-table tbody tr:hover{background:#F8F9FD;}
.table-title{font-weight:600;color:var(--ink-900);margin-bottom:3px;}
.table-meta{font-size:11.5px;color:var(--ink-500);}
.row-actions{display:flex;gap:6px;}
.icon-btn{
  width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-500);
}
.icon-btn:hover{background:var(--bg);color:var(--navy-800);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid var(--border);font-size:12.5px;color:var(--ink-500);flex-wrap:wrap;gap:10px;}
.page-size-select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:var(--bg);color:var(--ink-700);cursor:pointer;margin-left:8px;}
.pagination-left{display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.page-btns{display:flex;gap:6px;}
.page-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12.5px;color:var(--ink-700);transition:background .12s;}
.page-btn:hover:not(:disabled):not(.active){background:var(--gold-100);border-color:var(--gold-400);}
.page-btn.active{background:var(--navy-800);color:#fff;border-color:var(--navy-800);}
.page-btn:disabled{opacity:.4;cursor:not-allowed;}

.empty-state{padding:60px 20px;text-align:center;color:var(--ink-500);}
.empty-state svg{color:var(--ink-300);margin-bottom:12px;}
.empty-state h3{font-family:'Sora',sans-serif;color:var(--ink-700);margin:0 0 6px;font-size:16px;}

/* ===== CALENDAR ===== */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;padding:16px 18px;
  background:linear-gradient(120deg,var(--navy-800),var(--navy-700));border-radius:14px 14px 0 0;
}
.cal-title{font-family:'Sora',sans-serif;font-weight:700;font-size:17px;color:#fff;}
.cal-nav{display:flex;gap:6px;}
.cal-nav .btn-outline{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.25);}
.cal-nav .btn-outline:hover{background:rgba(255,255,255,.22);border-color:var(--gold-400);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:38px;grid-auto-rows:118px;}
.cal-dow{
  display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;
  background:var(--navy-600);letter-spacing:.05em;
}
.cal-dow.weekend{background:#3A5599;}
.cal-cell{
  height:118px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);
  padding:7px;position:relative;overflow:hidden;background:#fff;display:flex;flex-direction:column;
}
.cal-cell.weekend{background:#F4F7FF;}
.cal-cell.muted{background:#EEF0F5;}
.cal-cell.today{background:linear-gradient(160deg,#FFF7E3,var(--gold-100));box-shadow:inset 0 0 0 2px var(--gold-500);}
.cal-daynum{font-size:12.5px;font-weight:700;color:var(--ink-500);margin-bottom:4px;flex-shrink:0;}
.cal-cell.today .cal-daynum{color:var(--navy-800);font-weight:800;}
.cal-events-scroll{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px;padding-right:2px;}
.cal-event{
  font-size:10.5px;padding:3px 7px;border-radius:6px;cursor:pointer;font-weight:700;line-height:1.3;
  white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.cal-event:hover{filter:brightness(0.95);}
.cal-more{font-size:10px;color:var(--navy-700);font-weight:700;cursor:pointer;padding:2px 6px;flex-shrink:0;}

/* ===== KANBAN ===== */
.kanban-wrap{display:flex;gap:14px;padding:16px;overflow-x:auto;}
.kanban-col{flex:1 1 260px;min-width:260px;background:var(--bg);border-radius:var(--radius-sm);padding:12px;max-height:640px;display:flex;flex-direction:column;}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px;}
.kanban-col-title{font-family:'Sora',sans-serif;font-weight:700;font-size:13px;}
.kanban-count{background:#fff;border:1px solid var(--border);border-radius:20px;padding:1px 9px;font-size:11px;color:var(--ink-500);}
.kanban-cards{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:2px;}
.kanban-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;box-shadow:var(--shadow-sm);}
.kanban-card:hover{border-color:var(--navy-600);}
.kanban-card-title{font-size:12.5px;font-weight:600;color:var(--ink-900);margin-bottom:6px;line-height:1.3;}
.kanban-card-meta{font-size:11px;color:var(--ink-500);display:flex;align-items:center;gap:4px;margin-top:4px;}

/* ===== MATRIX ===== */
.matrix-wrap{padding:16px;overflow-x:auto;}
table.matrix-table{border-collapse:collapse;font-size:12px;width:100%;table-layout:fixed;}
table.matrix-table th, table.matrix-table td{border:1px solid var(--border-soft);padding:9px 8px;text-align:center;white-space:normal;word-break:break-word;overflow-wrap:break-word;line-height:1.3;}
table.matrix-table th{background:var(--bg);font-weight:700;color:var(--ink-700);font-size:11px;}
table.matrix-table td.matrix-label{text-align:left;font-weight:600;background:var(--bg);color:var(--ink-700);}
table.matrix-table td.matrix-cell{font-weight:700;color:var(--navy-800);}
table.matrix-table td.matrix-total{background:var(--gold-100);font-weight:800;color:var(--navy-900);}

/* ===== ANALYTICS ===== */
.analytics-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;padding:16px;}
@media (max-width:1000px){.analytics-grid{grid-template-columns:1fr;}}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;position:relative;overflow:hidden;}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--chart-accent, var(--navy-700));}
.chart-card h3{font-family:'Sora',sans-serif;font-size:13.5px;margin:0 0 12px;color:var(--ink-900);}
.chart-box{position:relative;height:240px;}
.chart-box.tall{height:300px;}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(11,27,61,.55);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-box{background:#fff;border-radius:16px;max-width:720px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-box.small{max-width:420px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0;z-index:2;}
.modal-head h2{font-family:'Sora',sans-serif;font-size:17px;margin:0;color:var(--ink-900);flex:1;min-width:0;overflow-wrap:anywhere;}
.modal-close{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-500);flex-shrink:0;}
.modal-body{padding:22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:12px;font-weight:600;color:var(--ink-700);}
.form-field input, .form-field select, .form-field textarea{
  padding:9px 11px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--ink-900);
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus{outline:2px solid var(--navy-600);outline-offset:-1px;background:#fff;}
.form-field textarea{resize:vertical;min-height:60px;}
.req{color:var(--red);}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detail-item{padding:10px 0;border-bottom:1px solid var(--border-soft);}
.detail-item.full{grid-column:1/-1;}
.detail-label{font-size:11px;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.detail-value{font-size:13.5px;color:var(--ink-900);white-space:pre-line;line-height:1.5;}
.doc-download-link{
  display:inline-flex;align-items:center;gap:6px;color:var(--navy-700);font-weight:600;text-decoration:underline;
  text-underline-offset:2px;cursor:pointer;
}
.doc-download-link:hover{color:var(--gold-600,#8A6A1B);}
.doc-download-link .icon{width:14px;height:14px;flex-shrink:0;}

/* ===== KNOWLEDGE ===== */
.kb-hero{
  background:linear-gradient(120deg,var(--navy-900) 0%, var(--navy-700) 100%);
  border-radius:var(--radius);padding:26px 28px;color:#fff;margin-bottom:20px;
  display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px;
  box-shadow:var(--shadow-md);
}
.kb-hero-text h2{font-family:'Sora',sans-serif;font-size:21px;font-weight:700;margin:0 0 6px;}
.kb-hero-text p{margin:0;color:#B9C3E0;font-size:12.5px;max-width:440px;line-height:1.5;}
.kb-hero-search{
  display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.22);border-radius:10px;padding:10px 14px;min-width:260px;flex-shrink:0;
}
.kb-hero-search svg{color:#B9C3E0;flex-shrink:0;}
.kb-hero-search input{background:transparent;border:none;outline:none;color:#fff;font-size:13px;flex:1;font-family:'Inter',sans-serif;}
.kb-hero-search input::placeholder{color:#B9C3E0;}

.kb-category-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
.kb-category-tile{
  display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;cursor:pointer;
  min-width:112px;box-shadow:var(--shadow-sm);transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  font-family:'Inter',sans-serif;
}
.kb-category-tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--gold-400);}
.kb-category-icon{
  width:36px;height:36px;border-radius:10px;background:var(--gold-100);color:#8A6A1B;
  display:flex;align-items:center;justify-content:center;
}
.kb-category-tile span{font-size:11.5px;font-weight:600;color:var(--ink-700);text-align:center;}

.knowledge-group{margin-bottom:24px;scroll-margin-top:110px;}
.knowledge-group:last-child{margin-bottom:0;}
.knowledge-group-title{
  display:flex;align-items:center;gap:8px;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;
  color:var(--navy-800);margin-bottom:12px;
}
.knowledge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.knowledge-card{
  display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}
.knowledge-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--gold-400);}
.knowledge-card-photo{
  height:118px;background-size:cover;background-position:center;background-color:var(--gray-bg);
  position:relative;display:flex;align-items:flex-start;justify-content:space-between;padding:10px;
}
.knowledge-card-type-badge{
  background:rgba(11,27,61,.72);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;
  border-radius:20px;text-transform:uppercase;letter-spacing:.04em;
}
.knowledge-card-actions{display:flex;gap:5px;flex-shrink:0;}
.icon-btn-photo{background:rgba(255,255,255,.9);}
.icon-btn-photo:hover{background:#fff;}
.knowledge-card-body{padding:14px 16px;display:flex;flex-direction:column;flex:1;}
.knowledge-title{font-family:'Sora',sans-serif;font-size:14.5px;font-weight:700;color:var(--ink-900);margin-bottom:4px;}
.knowledge-desc{font-size:12.5px;color:var(--ink-500);line-height:1.5;margin-bottom:10px;}
.knowledge-link{font-size:12.5px;font-weight:600;color:var(--navy-700);text-decoration:none;margin-top:auto;}
.knowledge-link:hover{text-decoration:underline;}
.knowledge-add-card{
  display:flex;align-items:center;justify-content:center;gap:6px;min-height:96px;
  background:transparent;border:1.5px dashed var(--border);border-radius:var(--radius);
  color:var(--ink-500);font-size:13px;font-weight:600;cursor:pointer;transition:background .12s ease, border-color .12s ease;
}
.knowledge-add-card:hover{background:var(--gold-100);border-color:var(--gold-400);color:#8A6A1B;}

/* ===== KPI LIST ===== */
.kpi-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;}
.kpi-list-row{
  display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:background .12s ease, border-color .12s ease;
}
.kpi-list-row:hover{background:#F8F9FD;border-color:var(--gold-400);}
.kpi-list-no{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--gray-bg);color:var(--ink-500);
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
.kpi-list-title{font-size:13.5px;font-weight:600;color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kpi-list-meta{font-size:11.5px;color:var(--ink-500);margin-top:2px;}

/* ===== CONTACT ===== */
.contact-sheets-wrap{padding:0 16px 16px;}
.contact-sheet{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;background:var(--surface);}
.contact-sheet:last-child{margin-bottom:0;}
.contact-sheet-title{
  display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;list-style:none;
  font-family:'Sora',sans-serif;font-size:14.5px;font-weight:700;color:#fff;
  background:linear-gradient(120deg,var(--navy-800) 0%,var(--navy-600) 100%);
}
.contact-sheet-title::-webkit-details-marker{display:none;}
.contact-sheet-title .count-badge{background:rgba(255,255,255,.22);color:#fff;}
.contact-squads{padding:12px;display:flex;flex-direction:column;gap:8px;}
.contact-squad{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);overflow:hidden;}
.contact-squad-title{
  display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;list-style:none;
  font-size:12.5px;font-weight:700;color:var(--navy-800);
}
.contact-squad-title::-webkit-details-marker{display:none;}
.contact-squad[open] .contact-squad-title{border-bottom:1px solid var(--border);}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;padding:12px;background:var(--surface);}
.contact-card{
  display:flex;gap:10px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);
  transition:box-shadow .12s ease, border-color .12s ease;
}
.contact-card:hover{box-shadow:var(--shadow-sm);border-color:var(--gold-400);}
.contact-avatar{
  width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--navy-700),var(--navy-800));color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:700;font-size:12.5px;
  flex-shrink:0;
}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:13px;font-weight:700;color:var(--ink-900);margin-bottom:2px;overflow-wrap:anywhere;}
.contact-jabatan{font-size:11.5px;color:var(--ink-500);line-height:1.4;margin-bottom:6px;overflow-wrap:anywhere;}
.contact-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.peran-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.peran-badge.peran-ketua{background:var(--gold-100);color:#8A6A1B;}
.peran-badge.peran-anggota{background:var(--blue-bg);color:var(--blue);}
.peran-badge.peran-other{background:var(--gray-bg);color:var(--ink-500);}
.unit-badge-sm{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;background:var(--gray-bg);color:var(--ink-700);white-space:normal;line-height:1.3;}
.contact-nip{font-size:10.5px;color:var(--ink-300);}

/* ===== TOAST ===== */
#toastContainer{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--navy-900);color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;min-width:260px;max-width:360px;
  animation:slideIn .25s ease;
}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.info{background:var(--navy-800);}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ===== IMPORT DROP-ZONE ===== */
.drop-zone{
  border:2.5px dashed var(--border);border-radius:14px;padding:40px 24px;text-align:center;
  cursor:pointer;transition:border-color .15s, background .15s;background:var(--bg);
}
.drop-zone:hover{border-color:var(--gold-500);background:var(--gold-100);}
.drop-zone.drag-over{border-color:var(--navy-700);background:var(--blue-bg);}
.drop-zone svg{color:var(--ink-300);margin-bottom:10px;}
.drop-zone.drag-over svg{color:var(--navy-700);}
.drop-zone-title{font-family:'Sora',sans-serif;font-weight:700;font-size:14.5px;color:var(--ink-900);margin-bottom:4px;}
.drop-zone-sub{font-size:12.5px;color:var(--ink-500);}
.drop-zone-browse{color:var(--navy-700);font-weight:700;text-decoration:underline;cursor:pointer;}

/* ===== LOADING ===== */
#loadingOverlay{position:fixed;inset:0;background:rgba(11,27,61,.75);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#fff;}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.25);border-top-color:var(--gold-500);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

footer.app-footer{text-align:center;padding:22px;color:var(--ink-500);font-size:12px;}

/* ===== MOBILE ===== */
@media (max-width:600px){
  main.content{padding:16px 12px 40px;}
  header.topbar{padding:14px 16px;}
  .brand-text h1{font-size:15.5px;}
  .brand-text p{font-size:11px;}
  .topbar-actions{width:100%;justify-content:flex-start;}
  .topbar-divider{display:none;}
  .form-grid{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .kb-hero{padding:20px 18px;}
  .kb-hero-text h2{font-size:17px;}
  .kb-hero-search{min-width:0;width:100%;}
  .kb-category-tile{min-width:0;flex:1 1 30%;padding:10px 8px;}
  .modal-box{max-height:92vh;}
  .modal-body{padding:16px;}
  .modal-head{padding:14px 16px;}
  .modal-foot{padding:12px 16px;flex-wrap:wrap;}
}

@media print{header.topbar,.filter-bar,.tabs,.row-actions,footer{display:none;}}
</style>

  'T-TALK': { bg:'var(--purple-bg)', fg:'var(--purple)', code:'TALK' },
  'T-LAB': { bg:'var(--blue-bg)', fg:'var(--blue)', code:'LAB' },
  'T-FORUM': { bg:'#FFF0E0', fg:'#B85C10', code:'FORUM' },
  'T-MEDIA': { bg:'var(--pink-bg)', fg:'var(--pink)', code:'MEDIA' },
  'T-BOND': { bg:'var(--teal-bg)', fg:'var(--teal)', code:'BOND' },
  'T-SPACE': { bg:'#E7F6E2', fg:'#2E8B3D', code:'SPACE' },
  'T-WALK': { bg:'#E7F6E2', fg:'#2E8B3D', code:'WALK' },
  'T-CONNECT': { bg:'var(--blue-bg)', fg:'var(--blue)', code:'CONN' },
  'T-PEDIA': { bg:'var(--gold-100)', fg:'#8A6A1B', code:'PEDIA' },
  'T-COURSE': { bg:'var(--gold-100)', fg:'#8A6A1B', code:'COURSE' },
  'T-QUIZ': { bg:'#FFF0E0', fg:'#B85C10', code:'QUIZ' },
  'T-SURVEY': { bg:'var(--teal-bg)', fg:'var(--teal)', code:'SURVEY' },
  'DEFAULT': { bg:'var(--gray-bg)', fg:'var(--gray)', code:'LAIN' },
};
function getCategoryStyle(kategori) {
  const up = (kategori || '').toUpperCase();
  for (const key in CATEGORY_STYLES) {
    if (key !== 'DEFAULT' && up.includes(key)) return CATEGORY_STYLES[key];
  }
  return CATEGORY_STYLES.DEFAULT;
}

// Normalize free-text status into canonical buckets
function normalizeStatus(raw) {
  const s = (raw || '').toLowerCase();
  if (s.includes('batal') || s.includes('cancel')) return 'Cancelled';
  if (s.includes('done') || s.includes('selesai')) return 'Completed';
  if (s.includes('menunggu') || s.includes('tunda') || s.includes('pending')) return 'Pending';
  if (s.includes('confirm') || s.includes('berjalan') || s.includes('proses')) return 'Ongoing';
  if (!s) return 'Scheduled';
  return 'Scheduled';
}
const STATUS_STYLES = {
  'Completed':  { bg:'#E7ECF6', fg:'#12275A' },
  'Scheduled':  { bg:'#EBF1FA', fg:'#254A8C' },
  'Ongoing':    { bg:'#F6EFDC', fg:'#C8A84B' },
  'Pending':    { bg:'#F3E7C9', fg:'#8A6A1B' },
  'Cancelled':  { bg:'var(--red-bg)',    fg:'var(--red)' },
};

function fmtRupiah(n) {
  n = Number(n) || 0;
  return 'Rp ' + n.toLocaleString('id-ID');
}
function fmtDate(d, format) {
  if (!d) return '-';
  const dj = dayjs(d);
  if (!dj.isValid()) return d;
  return dj.format(format || 'DD MMM YYYY');
}
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function uid(prefix) {
  return (prefix || 'AGD') + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
// Splits a name-list string on commas AND the word "dan" (whole word only, case-insensitive)
// so "Tya dan Dina" is treated the same as "Tya, Dina" — two separate people, not one cluster.
function splitNames(str) {
  if (!str) return [];
  return String(str).split(/\s*,\s*|\s+dan\s+/gi).map(s => s.trim()).filter(Boolean);
}

// Classify whether a "Unit Pemohon" is internal to Kemenkeu (Eselon I/II units, always prefixed DJ,
// or known central units) versus an external institution (other K/L, OJK, etc.)
const KEMENKEU_INTERNAL_UNITS = new Set([
  'BATII','SETJEN','ITJEN','BPPK','PUSMANTAP','PUSDATIN','PUSINTEK','PUSPENSI','PUSAKTI',
  'PUSDIKLAT','PUSKPAKN','PUSAT LPSE','LNSW','LPDP','STAN','PKN STAN'
]);
function isInternalUnit(unit) {
  const u = (unit || '').toUpperCase().trim();
  if (!u || u === '-') return true;
  if (u.startsWith('DJ')) return true;
  return KEMENKEU_INTERNAL_UNITS.has(u);
}

/* ============================================================
   PREPROCESS / DERIVED FIELDS
============================================================ */
function preprocess(list) {
  return list.map(item => {
    const tglMulai = item.tglMulai || dayjs().format('YYYY-MM-DD');
    const searchKey = [
      item.namaKegiatan, item.picTimCM, item.programTerkait, item.kategori,
      item.unitAsalNarsum, item.unitPemohon, item.lokasiChannel, item.undangan, item.suratTugas, item.status
    ].join(' ').toLowerCase();
    return {
      id: item.id || uid('AGD'),
      no: item.no || 0,
      tglMulai,
      tglSelesai: item.tglSelesai || tglMulai,
      waktu: item.waktu || '',
      namaKegiatan: item.namaKegiatan || 'Unnamed',
      layanan: normalizeLayanan(item.layanan),
      unitPemohon: item.unitPemohon || '-',
      undangan: item.undangan || '',
      undanganUrl: item.undanganUrl || '',
      suratTugas: item.suratTugas || '',
      suratTugasUrl: item.suratTugasUrl || '',
      kategori: item.kategori || 'Lainnya',
      programTerkait: item.programTerkait || '-',
      tujuanOutput: item.tujuanOutput || '',
      materi: item.materi || '',
      unitAsalNarsum: item.unitAsalNarsum || '',
      pesertaTarget: item.pesertaTarget || '',
      picTimCM: item.picTimCM || '',
      lokasiChannel: item.lokasiChannel || '',
      estimasiBiaya: Number(item.estimasiBiaya) || 0,
      status: item.status || '',
      statusNorm: normalizeStatus(item.status),
      catatan: item.catatan || '',
      yearMonth: tglMulai.slice(0, 7),
      _search: searchKey,
    };
  });
}
function normalizeLayanan(raw) {
  const s = String(raw || '').trim().toLowerCase();
  return (s === 'ya' || s === 'yes' || s === 'y' || s === 'true' || s === '1') ? 'Yes' : 'No';
}


/* ============================================================
   STORAGE (window.storage — persistent, personal)
============================================================ */
// Uses Claude's window.storage API when available (inside a Claude.ai artifact),
// and transparently falls back to the browser's own localStorage when it isn't
// (e.g. when this file is hosted standalone on GitHub Pages or any other server).
function hasClaudeStorage() {
  return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.set === 'function';
}

async function persist() {
  const dot = document.getElementById('storageDot');
  const txt = document.getElementById('storageText');
  try {
    dot.classList.add('saving'); txt.textContent = 'Saving...';
    if (hasClaudeStorage()) {
      await window.storage.set(STORAGE_KEY, JSON.stringify(state.agendas), false);
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.agendas));
    }
    dot.classList.remove('saving'); txt.textContent = 'Saved';
    await recordLastUpdate();
  } catch (e) {
    dot.classList.remove('saving'); txt.textContent = 'Sync failed';
    console.error('Storage error:', e);
  }
}

async function loadInitial() {
  let loaded = null;
  try {
    if (hasClaudeStorage()) {
      const res = await window.storage.get(STORAGE_KEY, false);
      if (res && res.value) loaded = JSON.parse(res.value);
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) loaded = JSON.parse(raw);
    }
  } catch (e) {
    loaded = null;
  }
  if (loaded && Array.isArray(loaded) && loaded.length) {
    state.agendas = preprocess(loaded);
  } else {
    const seedEl = document.getElementById('seedDataJson');
    let seed = [];
    try { seed = JSON.parse(seedEl.textContent); } catch (e) { seed = []; }
    state.agendas = preprocess(seed);
  }
}

/* ============================================================
   FILTER / SORT / PAGINATE
============================================================ */
function getFiltered() {
  const f = state.filters;
  const q = f.search.trim().toLowerCase();
  let out = state.agendas.filter(a => {
    if (q && !a._search.includes(q)) return false;
    if (f.kategori !== 'ALL' && a.kategori !== f.kategori) return false;
    if (f.program !== 'ALL' && a.programTerkait !== f.program) return false;
    if (f.status !== 'ALL' && a.statusNorm !== f.status) return false;
    if (f.pic !== 'ALL' && !a.picTimCM.toLowerCase().includes(f.pic.toLowerCase())) return false;
    if (f.unit !== 'ALL' && a.unitPemohon !== f.unit) return false;
    if (f.layanan !== 'ALL' && a.layanan !== f.layanan) return false;
    if (f.dateFrom && a.tglMulai < f.dateFrom) return false;
    if (f.dateTo && a.tglMulai > f.dateTo) return false;
    return true;
  });
  out.sort((x, y) => {
    let av = x[state.sortKey], bv = y[state.sortKey];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return state.sortDir === 'asc' ? -1 : 1;
    if (av > bv) return state.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  return out;
}

function uniqueSorted(list, key, splitComma) {
  const set = new Set();
  list.forEach(item => {
    const val = item[key];
    if (!val) return;
    if (splitComma) {
      splitNames(val).forEach(t => { if (t) set.add(t); });
    } else {
      set.add(val);
    }
  });
  return Array.from(set).sort((a, b) => a.localeCompare(b, 'id'));
}

function populateFilterDropdowns() {
  const kategoris = uniqueSorted(state.agendas, 'kategori');
  const programs = uniqueSorted(state.agendas, 'programTerkait');
  const statuses = Array.from(new Set(state.agendas.map(a => a.statusNorm))).sort();
  const pics = uniqueSorted(state.agendas, 'picTimCM', true);
  const units = uniqueSorted(state.agendas, 'unitPemohon');

  fillSelect('filterKategori', kategoris, 'All Categories', state.filters.kategori);
  fillSelect('filterProgram', programs, 'All Programs', state.filters.program);
  fillSelect('filterStatus', statuses, 'All Status', state.filters.status);
  fillSelect('filterPic', pics, 'All PIC', state.filters.pic);
  fillSelect('filterUnit', units, 'All Requesting Units', state.filters.unit);
  fillSelect('filterLayanan', ['Yes', 'No'], 'All (Service & Non-Service)', state.filters.layanan);
}
function fillSelect(id, options, defaultLabel, currentVal) {
  const el = document.getElementById(id);
  const prev = currentVal || el.value || 'ALL';
  el.innerHTML = `<option value="ALL">${defaultLabel}</option>` +
    options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');
  if (options.includes(prev)) el.value = prev; else el.value = 'ALL';
}

============================================================ */
function renderKPI() {
  const all = state.agendas;
  const thisMonth = dayjs().format('YYYY-MM');
  const total = all.length;
  const bulanIniItems = all.filter(a => a.yearMonth === thisMonth);
  const selesaiItems = all.filter(a => a.statusNorm === 'Completed');
  const terjadwalItems = all.filter(a => a.statusNorm === 'Scheduled' || a.statusNorm === 'Ongoing');
  const unitNames = Array.from(new Set(all.map(a => a.unitPemohon).filter(u => u && u !== '-'))).sort((x, y) => x.localeCompare(y));
  const unitCount = unitNames.length;
  const catCount = {};
  all.forEach(a => { catCount[a.kategori] = (catCount[a.kategori] || 0) + 1; });
  const topCat = Object.entries(catCount).sort((a, b) => b[1] - a[1])[0];
  const topCatItems = topCat ? all.filter(a => a.kategori === topCat[0]) : [];

  const layananItems = all.filter(a => a.layanan === 'Yes');

  const cards = [
    { label:'Total Activities', value: total, sub: 'all periods', icon: iconCalendar(), color:'navy', kind:'activities', items: all, title:'Total Activities' },
    { label:'This Month', value: bulanIniItems.length, sub: dayjs().format('MMMM YYYY'), icon: iconClock(), color:'blue', kind:'activities', items: bulanIniItems, title:`Activities in ${dayjs().format('MMMM YYYY')}` },
    { label:'Completed', value: selesaiItems.length, sub: total ? Math.round(selesaiItems.length/total*100)+'% of total' : '-', icon: iconCheck(), color:'green', kind:'activities', items: selesaiItems, title:'Completed Activities' },
    { label:'Scheduled/Ongoing', value: terjadwalItems.length, sub: 'needs follow-up', icon: iconFlag(), color:'amber', kind:'activities', items: terjadwalItems, title:'Scheduled / Ongoing Activities' },
    { label:'Service', value: layananItems.length, sub: total ? Math.round(layananItems.length/total*100)+'% of total activities' : '-', icon: iconCheck(), color:'green', kind:'activities', items: layananItems, title:'Service Activities' },
    { label:'Active Requesting Units', value: unitCount, sub: 'distinct units submitting', icon: iconBuilding(), color:'gold', kind:'units', items: unitNames.map(u => ({ unit:u, count: all.filter(a => a.unitPemohon === u).length })), title:'Active Requesting Units' },
    { label:'Top Category', value: topCat ? topCat[0] : '-', sub: topCat ? topCat[1]+' activities' : '-', icon: iconTag(), color:'purple', small:true, kind:'activities', items: topCatItems, title: topCat ? `Activities in "${topCat[0]}"` : 'Top Category' },
  ];
  const colorMap = { navy:['var(--navy-800)','#fff','#1B3A73'], blue:['var(--blue-bg)','var(--blue)','#2F6FCE'], green:['var(--green-bg)','var(--green)','#15916F'], amber:['var(--amber-bg)','var(--amber)','#B87A12'], gold:['var(--gold-100)','#8A6A1B','#C8A84B'], purple:['var(--purple-bg)','var(--purple)','#6D53C7'] };
  document.getElementById('kpiGrid').innerHTML = cards.map((c, i) => {
    const [bg, fg, accent] = colorMap[c.color];
    return `<div class="kpi-card" data-kpi-idx="${i}" style="--accent-color:${accent};cursor:pointer;" title="Click to view the list">
      <div class="kpi-card-head">
        <div class="kpi-icon" style="background:${bg};color:${fg}">${c.icon}</div>
        <div class="kpi-label">${c.label}</div>
      </div>
      <div class="kpi-value" style="${c.small?'font-size:16px;':''}">${escapeHtml(String(c.value))}</div>
      <div class="kpi-sub">${escapeHtml(c.sub)}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('#kpiGrid .kpi-card').forEach(el => {
    el.addEventListener('click', () => openKpiList(cards[Number(el.dataset.kpiIdx)]));
  });
}

/* ============================================================
   KPI LIST MODAL — shows the activities (or units) behind a KPI card
============================================================ */
function openKpiList(card) {
  const modal = document.getElementById('kpiModal');
  let bodyHtml;
  if (card.kind === 'units') {
    const rows = card.items.sort((a, b) => b.count - a.count);
    bodyHtml = rows.length
      ? `<div class="kpi-list">` + rows.map((r, i) => `
        <div class="kpi-list-row" data-unit="${escapeHtml(r.unit)}">
          <span class="kpi-list-no">${i + 1}</span>
          <span class="kpi-list-title" style="flex:1;min-width:0;">${escapeHtml(r.unit)}</span>
          <span class="count-badge">${r.count}</span>
        </div>`).join('') + `</div>`
      : emptyState('No data available', '');
  } else {
    const rows = card.items.slice().sort((a, b) => a.tglMulai.localeCompare(b.tglMulai));
    bodyHtml = rows.length
      ? `<div class="kpi-list">` + rows.map((a, i) => {
          const cs = getCategoryStyle(a.kategori);
          const ss = STATUS_STYLES[a.statusNorm] || STATUS_STYLES['Scheduled'];
          return `<div class="kpi-list-row" data-id="${a.id}">
            <span class="kpi-list-no">${i + 1}</span>
            <div style="flex:1;min-width:0;">
              <div class="kpi-list-title">${escapeHtml(a.namaKegiatan)}</div>
              <div class="kpi-list-meta">${fmtDate(a.tglMulai)} · ${escapeHtml(a.unitPemohon)}</div>
            </div>
            <span class="cat-badge" style="background:${cs.bg};color:${cs.fg};flex-shrink:0;">${escapeHtml(a.kategori)}</span>
            <span class="status-badge" style="background:${ss.bg};color:${ss.fg};flex-shrink:0;">${a.statusNorm}</span>
          </div>`;
        }).join('') + `</div>`
      : emptyState('No matching activities', '');
  }

  modal.innerHTML = `<div class="modal-box">
    <div class="modal-head">
      <h2>${escapeHtml(card.title)} <span class="count-badge">${card.items.length}</span></h2>
      <button class="modal-close" id="closeKpiList">&times;</button>
    </div>
    <div class="modal-body">${bodyHtml}</div>
  </div>`;
  modal.classList.remove('hidden');
  document.getElementById('closeKpiList').addEventListener('click', () => modal.classList.add('hidden'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });
  modal.querySelectorAll('.kpi-list-row[data-id]').forEach(el => {
    el.addEventListener('click', () => { modal.classList.add('hidden'); openDetail(el.dataset.id); });
  });
  modal.querySelectorAll('.kpi-list-row[data-unit]').forEach(el => {
    el.addEventListener('click', () => {
      modal.classList.add('hidden');
      state.filters.unit = el.dataset.unit;
      document.getElementById('filterUnit').value = el.dataset.unit;
      state.page = 1;
      switchTab('table');
      refreshAll();
    });
  });
}

function renderTable() {
  const filtered = getFiltered();
  document.getElementById('cntTable').textContent = filtered.length;
  const pageSize = state.pageSize;
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  state.page = Math.min(state.page, totalPages);
  const startIdx = (state.page - 1) * pageSize;
  const pageItems = filtered.slice(startIdx, startIdx + pageSize);

  const container = document.getElementById('tab-table');
  if (!filtered.length) {
    container.innerHTML = emptyState('No matching agenda found', 'Try adjusting filters, or add a new agenda.');
    return;
  }

  const cols = [
    { key:'tglMulai', label:'Date' },
    { key:'namaKegiatan', label:'Activity' },
    { key:'layanan', label:'Service' },
    { key:'unitPemohon', label:'Requesting Unit' },
    { key:'kategori', label:'Category' },
    { key:'programTerkait', label:'Program' },
    { key:'picTimCM', label:'PIC' },
    { key:'statusNorm', label:'Status' },
  ];
  const sortInd = k => state.sortKey === k ? `<span class="sort-ind">${state.sortDir === 'asc' ? '▲' : '▼'}</span>` : '';

  let html = `<div class="table-wrap"><table class="data-table"><thead><tr>`;
  html += `<th style="width:48px;">No</th>`;

  pageItems.forEach((a, idx) => {
    const cs = getCategoryStyle(a.kategori);
    const ss = STATUS_STYLES[a.statusNorm] || STATUS_STYLES['Scheduled'];
    const ls = a.layanan === 'Yes' ? { bg:'var(--blue-bg)', fg:'var(--navy-700)' } : { bg:'var(--gold-100)', fg:'#8A6A1B' };
    html += `<tr data-id="${a.id}">
      <td class="mono" style="color:var(--ink-500);font-weight:600;">${startIdx + idx + 1}</td>
      <td class="mono" style="white-space:nowrap;">${fmtDate(a.tglMulai)}${a.tglSelesai && a.tglSelesai !== a.tglMulai ? '<br><span class="table-meta">s.d. '+fmtDate(a.tglSelesai)+'</span>' : ''}</td>

      </td>
      <td><span class="status-badge" style="background:${ls.bg};color:${ls.fg}">${a.layanan}</span></td>
      <td><span class="unit-badge" style="${isInternalUnit(a.unitPemohon) ? '' : 'background:var(--gold-500);color:#4A3A0A;'}">${escapeHtml(a.unitPemohon)}</span></td>
      <td><span class="cat-badge" style="background:${cs.bg};color:${cs.fg}">${escapeHtml(a.kategori)}</span></td>
      <td style="max-width:160px;">${escapeHtml(a.programTerkait)}</td>
      <td style="max-width:150px;">${escapeHtml(a.picTimCM)}</td>
      <td><span class="status-badge" style="background:${ss.bg};color:${ss.fg}">${a.statusNorm}</span></td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" data-action="edit" data-id="${a.id}" title="Edit">${iconEdit()}</button>
          <button class="icon-btn" data-action="delete" data-id="${a.id}" title="Delete">${iconTrash()}</button>
        </div>
      </td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  html += `<div class="pagination">
    <div class="pagination-left">
      <span>Menampilkan ${startIdx + 1}–${Math.min(startIdx + pageSize, filtered.length)} dari ${filtered.length} kegiatan</span>
      <select class="page-size-select" id="pageSizeSelect">
        ${[10,20,50,100].map(n => `<option value="${n}" ${n===pageSize?'selected':''}>${n} / halaman</option>`).join('')}
      </select>
    </div>
    <div class="page-btns">
      <button class="page-btn" id="pagePrev" ${state.page === 1 ? 'disabled' : ''}>&lsaquo;</button>
      ${pageButtons(state.page, totalPages)}
      <button class="page-btn" id="pageNext" ${state.page === totalPages ? 'disabled' : ''}>&rsaquo;</button>
    </div>
  </div>`;

  container.innerHTML = html;

  container.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (state.sortKey === k) state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      else { state.sortKey = k; state.sortDir = 'asc'; }
      renderTable();
    });
  });
  container.querySelectorAll('tbody tr').forEach(tr => {
    tr.addEventListener('click', (e) => {
      if (e.target.closest('.icon-btn')) return;
      openDetail(tr.dataset.id);
    });
  });
  container.querySelectorAll('[data-action="edit"]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); openForm(b.dataset.id); }));
  container.querySelectorAll('[data-action="delete"]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); openConfirmDelete(b.dataset.id); }));
  const prevBtn = document.getElementById('pagePrev');
  const nextBtn = document.getElementById('pageNext');
  if (prevBtn) prevBtn.addEventListener('click', () => { state.page--; renderTable(); });
  if (nextBtn) nextBtn.addEventListener('click', () => { state.page++; renderTable(); });
  container.querySelectorAll('.page-btn[data-page]').forEach(b => b.addEventListener('click', () => { state.page = Number(b.dataset.page); renderTable(); }));
  const pageSizeSelect = document.getElementById('pageSizeSelect');
  if (pageSizeSelect) pageSizeSelect.addEventListener('change', (e) => { state.pageSize = Number(e.target.value); state.page = 1; renderTable(); });
}
function pageButtons(current, total) {
  let pages = [];
  const maxShown = 5;
  let start = Math.max(1, current - 2);
  let end = Math.min(total, start + maxShown - 1);
  start = Math.max(1, end - maxShown + 1);
  for (let i = start; i <= end; i++) pages.push(i);
  return pages.map(p => `<button class="page-btn ${p === current ? 'active' : ''}" data-page="${p}">${p}</button>`).join('');
}
function iconEdit(){return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>`;}
function iconTrash(){return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg>`;}
function emptyState(title, sub) {
  return `<div class="empty-state">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/><path d="M9 15l2 2 4-4"/></svg>
    <h3>${escapeHtml(title)}</h3>
    <p>${escapeHtml(sub)}</p>
  </div>`;
}

/* ============================================================
   RENDER: CALENDAR TAB
============================================================ */
function renderCalendar() {
  const container = document.getElementById('tab-calendar');
  const filtered = getFiltered();
  const monthStart = dayjs(state.calMonth + '-01');
  const daysInMonth = monthStart.daysInMonth();
  const firstDow = (monthStart.day() + 6) % 7; // Monday-first: 0=Sen ... 6=Min
  const todayStr = dayjs().format('YYYY-MM-DD');

  const eventsByDay = {};
  filtered.forEach(a => {
    if (a.tglMulai.slice(0, 7) === state.calMonth) {
      const day = Number(a.tglMulai.slice(8, 10));
      if (!eventsByDay[day]) eventsByDay[day] = [];
      eventsByDay[day].push(a);
    }
  });

  let html = `<div class="cal-header">
    <div class="cal-title">${monthStart.format('MMMM YYYY')}</div>
    <div class="cal-nav">
      <button class="btn btn-outline btn-sm" id="calPrev">&lsaquo; Previous</button>
      <button class="btn btn-outline btn-sm" id="calToday">Today</button>
      <button class="btn btn-outline btn-sm" id="calNext">Next &rsaquo;</button>
    </div>
  </div>
  <div class="cal-grid">`;
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((d, i) => html += `<div class="cal-dow ${(i===5||i===6)?'weekend':''}">${d}</div>`);
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-cell muted ${(i===5)?'weekend':''}"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = state.calMonth + '-' + String(d).padStart(2, '0');
    const isToday = dateStr === todayStr;
    const dow = (firstDow + d - 1) % 7;
    const isWeekend = dow === 5 || dow === 6;
    const evs = eventsByDay[d] || [];
    html += `<div class="cal-cell ${isToday ? 'today' : ''} ${isWeekend && !isToday ? 'weekend' : ''}">
      <div class="cal-daynum">${d}</div>
      <div class="cal-events-scroll">`;
    evs.slice(0, 4).forEach(ev => {
      const cs = getCategoryStyle(ev.kategori);
      html += `<div class="cal-event" data-id="${ev.id}" title="${escapeHtml(ev.namaKegiatan)}" style="background:${cs.bg};color:${cs.fg}">${escapeHtml(ev.namaKegiatan)}</div>`;
    });
    if (evs.length > 4) html += `<div class="cal-more" data-day="${d}">+${evs.length - 4} more</div>`;
    html += `</div></div>`;
  }
  html += `</div>`;
  container.innerHTML = html;

  document.getElementById('calPrev').addEventListener('click', () => { state.calMonth = monthStart.subtract(1, 'month').format('YYYY-MM'); renderCalendar(); });
  document.getElementById('calNext').addEventListener('click', () => { state.calMonth = monthStart.add(1, 'month').format('YYYY-MM'); renderCalendar(); });
  document.getElementById('calToday').addEventListener('click', () => { state.calMonth = dayjs().format('YYYY-MM'); renderCalendar(); });
  container.querySelectorAll('.cal-event').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.id)));
  container.querySelectorAll('.cal-more').forEach(el => el.addEventListener('click', () => {
    const day = el.dataset.day;
    const list = eventsByDay[day] || [];
    toast(list.map(x => x.namaKegiatan).join(' · '), 'info');
  }));
}

/* ============================================================
   RENDER: MATRIX TAB
============================================================ */
function renderMatrix() {
  const container = document.getElementById('tab-matrix');
  const filtered = getFiltered();

  const dimKey = state.matrixDim === 'unit' ? 'unitPemohon' : 'programTerkait';
  const dimLabel = state.matrixDim === 'unit' ? 'Requesting Unit' : 'Program';

  const toggleHtml = `<div style="display:flex;align-items:center;gap:8px;padding:14px 16px 0;">
    <span style="font-size:12px;font-weight:700;color:var(--ink-500);">Compare Category with:</span>
    <button class="btn btn-sm ${state.matrixDim!=='unit'?'btn-gold':'btn-outline'}" id="matrixDimProgram">Related Program</button>
    <button class="btn btn-sm ${state.matrixDim==='unit'?'btn-gold':'btn-outline'}" id="matrixDimUnit">Requesting Unit</button>
  </div>`;

  if (!filtered.length) { container.innerHTML = toggleHtml + emptyState('No data available for the matrix', 'Adjust filters or add data.'); wireMatrixToggle(); return; }

  const kategoris = uniqueSorted(filtered, 'kategori');
  const cols = uniqueSorted(filtered, dimKey);
  const grid = {};
  kategoris.forEach(k => { grid[k] = {}; cols.forEach(p => grid[k][p] = 0); });
  filtered.forEach(a => { if (grid[a.kategori]) grid[a.kategori][a[dimKey]] = (grid[a.kategori][a[dimKey]] || 0) + 1; });

  const maxVal = Math.max(1, ...kategoris.flatMap(k => cols.map(p => grid[k][p])));

  let colgroup = `<colgroup><col style="width:170px;">`;
  cols.forEach(() => { colgroup += `<col>`; });
  colgroup += `<col style="width:80px;"></colgroup>`;
  const minTableWidth = 170 + 80 + cols.length * 100;

  let html = toggleHtml + `<div class="matrix-wrap"><table class="matrix-table" style="min-width:${minTableWidth}px;">${colgroup}<thead><tr><th style="text-align:left;">Category \\ ${escapeHtml(dimLabel)}</th>`;
  cols.forEach(p => html += `<th>${escapeHtml(p)}</th>`);
  html += `<th>Total</th></tr></thead><tbody>`;
  kategoris.forEach(k => {
    let rowTotal = 0;
    html += `<tr><td class="matrix-label">${escapeHtml(k)}</td>`;
    cols.forEach(p => {
      const v = grid[k][p];
      rowTotal += v;
      const intensity = v / maxVal;
      const bgAlpha = v === 0 ? 'transparent' : `rgba(27,58,115,${0.08 + intensity * 0.35})`;
      html += `<td class="matrix-cell" style="background:${bgAlpha};">${v || ''}</td>`;
    });
    html += `<td class="matrix-total">${rowTotal}</td></tr>`;
  });
  // column totals
  html += `<tr><td class="matrix-label">Total</td>`;
  let grandTotal = 0;
  cols.forEach(p => {
    const colTotal = kategoris.reduce((s, k) => s + grid[k][p], 0);
    grandTotal += colTotal;
    html += `<td class="matrix-total">${colTotal}</td>`;
  });
  html += `<td class="matrix-total">${grandTotal}</td></tr>`;
  html += `</tbody></table></div>`;
  container.innerHTML = html;
  wireMatrixToggle();
}
function wireMatrixToggle() {
  const btnProgram = document.getElementById('matrixDimProgram');
  const btnUnit = document.getElementById('matrixDimUnit');
  if (btnProgram) btnProgram.addEventListener('click', () => { state.matrixDim = 'program'; renderMatrix(); });
  if (btnUnit) btnUnit.addEventListener('click', () => { state.matrixDim = 'unit'; renderMatrix(); });
}

// Custom Chart.js plugin: draws donut slice labels the way Excel/PowerPoint do —
// large slices get their label centered inside the ring; small slices (where an
// inside label would overlap its neighbors) get pushed outside with a leader line.
function buildDonutLeaderPlugin(opts) {
  const showName = !opts || opts.showName !== false;
  return {
    id: 'donutLeaderLabels',
    afterDraw(chart) {
      const meta = chart.getDatasetMeta(0);
      if (!meta || !meta.data || !meta.data.length) return;
      const ctx = chart.ctx;
      const dataArr = chart.data.datasets[0].data;
      const labelsArr = chart.data.labels;
      const total = dataArr.reduce((s, v) => s + (v || 0), 0);
      if (!total) return;

      const SMALL_THRESHOLD = 0.10; // slices under 10% get an outside leader-line label
      const outsidePoints = []; // collected first, so we can declutter vertically per side

      meta.data.forEach((arc, i) => {
        const value = dataArr[i] || 0;
        if (!value) return;
        const pct = value / total;
        const mid = (arc.startAngle + arc.endAngle) / 2;
        const cos = Math.cos(mid), sin = Math.sin(mid);
        const cx = arc.x, cy = arc.y;

        if (pct >= SMALL_THRESHOLD) {
          // Inside label — centered in the ring at the slice's mid-radius
          const r = (arc.innerRadius + arc.outerRadius) / 2;
          const px = cx + r * cos, py = cy + r * sin;
          ctx.save();
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          if (showName) {
            ctx.font = "700 12px 'Inter', sans-serif";
            ctx.fillText(String(labelsArr[i]), px, py - 7);
            ctx.font = "600 11px 'Inter', sans-serif";
            ctx.fillText(`${value} (${Math.round(pct * 100)}%)`, px, py + 8);
          } else {
            ctx.font = "700 13px 'Inter', sans-serif";
            ctx.fillText(`${value} (${Math.round(pct * 100)}%)`, px, py);
          }
          ctx.restore();
        } else {
          // Outside label — anchor point on the arc, elbow, then horizontal leader line
          const arcPt = { x: cx + arc.outerRadius * cos, y: cy + arc.outerRadius * sin };
          const elbow = { x: cx + (arc.outerRadius + 14) * cos, y: cy + (arc.outerRadius + 14) * sin };
          const side = cos >= 0 ? 1 : -1;
          const labelPt = { x: elbow.x + side * 22, y: elbow.y };
          outsidePoints.push({ i, value, pct, side, arcPt, elbow, labelPt, color: chart.data.datasets[0].backgroundColor[i] });
        }
      });

      // Declutter: within each side, sort by y and enforce a minimum vertical gap
      [-1, 1].forEach(side => {
        const group = outsidePoints.filter(p => p.side === side).sort((a, b) => a.labelPt.y - b.labelPt.y);
        const minGap = 34;
        for (let k = 1; k < group.length; k++) {
          if (group[k].labelPt.y - group[k - 1].labelPt.y < minGap) {
            group[k].labelPt.y = group[k - 1].labelPt.y + minGap;
          }
        }
      });

      outsidePoints.forEach(p => {
        ctx.save();
        // leader line: arc -> elbow -> label
        ctx.beginPath();
        ctx.moveTo(p.arcPt.x, p.arcPt.y);
        ctx.lineTo(p.elbow.x, p.elbow.y);
        ctx.lineTo(p.labelPt.x - (p.side * 4), p.labelPt.y);
        ctx.strokeStyle = '#9AA3BD';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // small dot at the arc point
        ctx.beginPath();
        ctx.arc(p.arcPt.x, p.arcPt.y, 2.2, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        ctx.textAlign = p.side === 1 ? 'left' : 'right';
        ctx.textBaseline = 'middle';
        const sub = `${p.value} (${Math.round(p.pct * 100)}%)`;
        if (showName) {
          ctx.font = "700 11.5px 'Inter', sans-serif";
          ctx.fillStyle = '#141B2E';
          const label = `${chart.data.labels[p.i]}`;
          ctx.fillText(label, p.labelPt.x, p.labelPt.y - 6);
          ctx.font = "600 10.5px 'Inter', sans-serif";
          ctx.fillStyle = '#5D6785';
          ctx.fillText(sub, p.labelPt.x, p.labelPt.y + 7);
        } else {
          ctx.font = "700 11.5px 'Inter', sans-serif";
          ctx.fillStyle = '#141B2E';
          ctx.fillText(sub, p.labelPt.x, p.labelPt.y);
        }
        ctx.restore();
      });
    }
  };
}

function cssVarToHex(varStr) {
  if (!varStr) return '#6B7284';
  if (varStr.startsWith('#')) return varStr; // already a raw hex color, pass through
  const map = { 'var(--green)':'#15916F','var(--blue)':'#2F6FCE','var(--amber)':'#B87A12','var(--red)':'#C13B3B','var(--teal)':'#188A8A',
    'var(--purple)':'#6D53C7','var(--pink)':'#C3488B','var(--gray)':'#6B7284','#2E8B3D':'#2E8B3D' };
  return map[varStr] || '#6B7284';
}

async function loadKnowledgeInitial() {
  let loaded = null;
  try {
    if (hasClaudeStorage()) {
      const res = await window.storage.get(KNOWLEDGE_STORAGE_KEY, false);
      if (res && res.value) loaded = JSON.parse(res.value);
    } else {
      const raw = localStorage.getItem(KNOWLEDGE_STORAGE_KEY);
      if (raw) loaded = JSON.parse(raw);
    }
  } catch (e) { loaded = null; }
  state.knowledge = (loaded && Array.isArray(loaded) && loaded.length) ? loaded : JSON.parse(JSON.stringify(KNOWLEDGE_DEFAULT_GROUPS));
}
async function persistKnowledge() {
  const dot = document.getElementById('storageDot');
  const txt = document.getElementById('storageText');
  try {
    dot.classList.add('saving'); txt.textContent = 'Saving...';
    if (hasClaudeStorage()) {
      await window.storage.set(KNOWLEDGE_STORAGE_KEY, JSON.stringify(state.knowledge), false);
    } else {
      localStorage.setItem(KNOWLEDGE_STORAGE_KEY, JSON.stringify(state.knowledge));
    }
    dot.classList.remove('saving'); txt.textContent = 'Saved';
    await recordLastUpdate();
  } catch (e) {
    dot.classList.remove('saving'); txt.textContent = 'Sync failed';
    console.error('Storage error:', e);
  }
}

const CONTACT_STORAGE_KEY = 'contacts_v1';
function normalizeContactList(raw) {
  return (raw || []).map((c, idx) => ({
    id: 'CT-' + idx,
    sheet: c.sheet || '',
    sheetTitle: c.sheetTitle || c.sheet || '',
    squadTeam: c.squadTeam || '-',
    unitEselonI: c.unitEselonI || '-',
    nama: c.nama || '',
    nip: c.nip || '',
    jabatan: c.jabatan || '',
    peran: c.peran || '',
    _search: [c.nama, c.nip, c.jabatan, c.peran, c.squadTeam, c.unitEselonI, c.sheetTitle].join(' ').toLowerCase(),
  }));
}
async function loadContactsInitial() {
  let loaded = null;
  try {
    if (hasClaudeStorage()) {
      const res = await window.storage.get(CONTACT_STORAGE_KEY, false);
      if (res && res.value) loaded = JSON.parse(res.value);
    } else {
      const raw = localStorage.getItem(CONTACT_STORAGE_KEY);
      if (raw) loaded = JSON.parse(raw);
    }
  } catch (e) { loaded = null; }
  if (loaded && Array.isArray(loaded) && loaded.length) {
    state.contacts = normalizeContactList(loaded);
    return;
  }
  const el = document.getElementById('contactSeedJson');
  let seed = [];
  try { seed = el ? JSON.parse(el.textContent) : []; } catch (e) { seed = []; }
  state.contacts = normalizeContactList(seed);
}
async function persistContacts() {
  const dot = document.getElementById('storageDot');
  const txt = document.getElementById('storageText');
  try {
    dot.classList.add('saving'); txt.textContent = 'Saving...';
    if (hasClaudeStorage()) {
      await window.storage.set(CONTACT_STORAGE_KEY, JSON.stringify(state.contacts), false);
    } else {
      localStorage.setItem(CONTACT_STORAGE_KEY, JSON.stringify(state.contacts));
    }
    dot.classList.remove('saving'); txt.textContent = 'Saved';
    await recordLastUpdate();
  } catch (e) {
    dot.classList.remove('saving'); txt.textContent = 'Sync failed';
    console.error('Storage error:', e);
  }
}

function contactInitials(nama) {
  if (!nama) return '?';
  const parts = nama.trim().split(/\s+/).filter(Boolean);
  const first = parts[0] ? parts[0][0] : '';
  const second = parts.length > 1 ? parts[1][0] : (parts[0] ? parts[0][1] || '' : '');
  return (first + second).toUpperCase() || '?';
}
function contactPeranClass(peran) {
  const p = (peran || '').toLowerCase();
  if (p.startsWith('ketua') || p === 'k') return 'peran-ketua';
  if (p.startsWith('anggota')) return 'peran-anggota';
  return 'peran-other';
}
function getFilteredContacts() {
  const f = state.contactFilters;
  const q = (f.search || '').trim().toLowerCase();
  return state.contacts.filter(c => {
    if (f.sheet !== 'ALL' && c.sheet !== f.sheet) return false;
    if (f.peran !== 'ALL' && c.peran !== f.peran) return false;
    if (f.unit !== 'ALL' && c.unitEselonI !== f.unit) return false;
    if (q && !c._search.includes(q)) return false;
    return true;
  });
}
function populateContactFilterDropdowns() {
  const sheets = [];
  const sheetSeen = new Set();
  const units = new Set();
  const perans = new Set();
  state.contacts.forEach(c => {
    if (!sheetSeen.has(c.sheet)) { sheetSeen.add(c.sheet); sheets.push({ value: c.sheet, label: c.sheetTitle }); }
    if (c.unitEselonI && c.unitEselonI !== '-') units.add(c.unitEselonI);
    if (c.peran) perans.add(c.peran);
  });
  const sheetSelect = document.getElementById('contactFilterSheet');
  if (sheetSelect) {
    const prev = state.contactFilters.sheet;
    sheetSelect.innerHTML = `<option value="ALL">All Teams</option>` + sheets.map(s => `<option value="${escapeHtml(s.value)}">${escapeHtml(s.label)}</option>`).join('');
    sheetSelect.value = sheets.some(s => s.value === prev) ? prev : 'ALL';
  }
  const peranSelect = document.getElementById('contactFilterPeran');
  if (peranSelect) {
    const prev = state.contactFilters.peran;
    const peranList = Array.from(perans).sort();
    peranSelect.innerHTML = `<option value="ALL">All Roles</option>` + peranList.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
    peranSelect.value = peranList.includes(prev) ? prev : 'ALL';
  }
  const unitSelect = document.getElementById('contactFilterUnit');
  if (unitSelect) {
    const prev = state.contactFilters.unit;
    const unitList = Array.from(units).sort((a, b) => a.localeCompare(b));
    unitSelect.innerHTML = `<option value="ALL">All Units</option>` + unitList.map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join('');
    unitSelect.value = unitList.includes(prev) ? prev : 'ALL';
  }
}
function renderContactResults() {
  const wrap = document.getElementById('contactResultsWrap');
  if (!wrap) return;
  const filtered = getFilteredContacts();
  const cnt = document.getElementById('cntContact');
  if (cnt) cnt.textContent = filtered.length;
  const f = state.contactFilters;
  const isFiltering = !!(f.search && f.search.trim()) || f.sheet !== 'ALL' || f.peran !== 'ALL' || f.unit !== 'ALL';

  // Group by sheet, then by squad team, preserving first-seen order
  const sheetMap = new Map();
  filtered.forEach(c => {
    if (!sheetMap.has(c.sheet)) sheetMap.set(c.sheet, { sheetTitle: c.sheetTitle, squads: new Map() });
    const sheetEntry = sheetMap.get(c.sheet);
    if (!sheetEntry.squads.has(c.squadTeam)) sheetEntry.squads.set(c.squadTeam, []);
    sheetEntry.squads.get(c.squadTeam).push(c);
  });

  if (sheetMap.size === 0) {
    wrap.innerHTML = `<div style="padding:16px;">${emptyState('No squad team members found', 'Try adjusting the search or filters.')}</div>`;
    return;
  }

  wrap.innerHTML = Array.from(sheetMap.entries()).map(([sheetKey, sheetData]) => {
    const sheetCount = Array.from(sheetData.squads.values()).reduce((s, arr) => s + arr.length, 0);
    const squadsHtml = Array.from(sheetData.squads.entries()).map(([squadName, members]) => `
      <details class="contact-squad" ${isFiltering ? 'open' : ''}>
        <summary class="contact-squad-title">
          <span style="flex:1;min-width:0;overflow-wrap:anywhere;">${escapeHtml(squadName)}</span>
          <span class="count-badge">${members.length}</span>
        </summary>
        <div class="contact-grid">${members.map(m => `
          <div class="contact-card">
            <div class="contact-avatar">${escapeHtml(contactInitials(m.nama))}</div>
            <div class="contact-info">
              <div class="contact-name">${escapeHtml(m.nama || 'Belum ditunjuk')}</div>
              <div class="contact-jabatan">${escapeHtml(m.jabatan || '-')}</div>

                <span class="unit-badge-sm">${escapeHtml(m.unitEselonI)}</span>
              </div>
              ${m.nip ? `<div class="contact-nip mono">NIP ${escapeHtml(m.nip)}</div>` : ''}
            </div>
          </div>`).join('')}</div>
      </details>`).join('');
    return `<details class="contact-sheet" open>
      <summary class="contact-sheet-title">
        <span style="flex:1;min-width:0;overflow-wrap:anywhere;">${escapeHtml(sheetData.sheetTitle)}</span>
        <span class="count-badge">${sheetCount}</span>

  }).join('');
}

// Detects whether a "Materi" value looks like a downloadable link.
function isUrlLike(s) {
  if (!s) return false;
  return /^(https?:\/\/|www\.)/i.test(String(s).trim());
}

// Derives a human-readable file name from a SharePoint/OneDrive-style URL so the
// hyperlink text shows what the file actually is, instead of the raw link.
function fileNameFromUrl(url) {
  try {
    const u = new URL(url);
    const fileParam = u.searchParams.get('file');
    if (fileParam) return decodeURIComponent(fileParam);
    const segments = u.pathname.split('/').filter(Boolean);
    const last = segments[segments.length - 1];
    if (last && last.includes('.')) return decodeURIComponent(last);
    return u.hostname + u.pathname;
  } catch (e) {
    return url;
  }
}

// Renders a reference-number field (Invitation / Assignment Letter): the reference
// text itself becomes the clickable hyperlink whenever a source URL is available —
// no separate button, no confirmation dialog. A toast confirms once the download
// has been triggered.
function renderDocValue(text, url) {
  const label = escapeHtml(text || '-');
  if (!url) return label;
  return `<a href="#" class="doc-download-link" data-url="${escapeHtml(url)}">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    ${label}
  </a>`;
}

// Renders the Materials field: a plain text value stays as text, but a URL-like
// value becomes a hyperlink labeled with the file's actual name (derived from the
// URL). Clicking it downloads the file directly — no confirmation dialog, a toast
// notification confirms once the download has been triggered.
function renderMateriValue(materi) {
  if (!materi) return '-';
  const raw = String(materi).trim();
  if (isUrlLike(raw)) {
    const url = /^www\./i.test(raw) ? 'https://' + raw : raw;
    const label = escapeHtml(fileNameFromUrl(url));
    return `<a href="#" class="doc-download-link" data-url="${escapeHtml(url)}">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      ${label}
    </a>`;
  }
  return escapeHtml(raw);
}

// Triggers an immediate download of the Materials link (no confirmation step).
// Tries a same-origin/CORS-enabled fetch to force a real file download; if that's
// blocked (typical for cross-origin links), falls back to opening the link directly
// so the browser/server can handle the download. Either way, a toast notification
// confirms once the download has been triggered.
async function downloadMateri(url) {
  try {
    const res = await fetch(url, { mode: 'cors' });
    if (!res.ok) throw new Error('fetch failed');
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    let filename = (url.split('/').pop() || '').split('?')[0] || 'materials';
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(blobUrl);
    toast('File downloaded successfully', 'success');
  } catch (err) {
    window.open(url, '_blank', 'noopener');
    toast('File downloaded successfully', 'success');
  }
}

async function submitForm() {
  const form = document.getElementById('agendaForm');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const fd = new FormData(form);
  const obj = {};
  fd.forEach((val, key) => obj[key] = val);

  if (state.editingId) {
    const idx = state.agendas.findIndex(x => x.id === state.editingId);
    if (idx > -1) {
      const merged = { ...state.agendas[idx], ...obj };
      state.agendas[idx] = preprocess([merged])[0];
    }
    toast('Activity updated successfully', 'success');
  } else {
    obj.id = uid('AGD');
    obj.no = state.agendas.length + 1;
    state.agendas.push(preprocess([obj])[0]);
    toast('New activity added successfully', 'success');
  }
  document.getElementById('formModal').classList.add('hidden');
  await persist();
  refreshAll();
}

/* ============================================================
   EXCEL IMPORT (robust, non-blocking, never hangs)
============================================================ */
const FIELD_MATCHERS = [
  ['tglMulai', ['tanggal mulai','tgl mulai','tanggal awal','start date']],
  ['tglSelesai', ['tanggal selesai','tgl selesai','tanggal akhir','end date']],
  ['waktu', ['waktu','jam','time']],
  ['namaKegiatan', ['nama kegiatan','nama agenda','kegiatan','judul','agenda','activity name','activity']],
  ['layanan', ['layanan','service']],
  ['unitPemohon', ['unit pemohon','pemohon','requesting unit']],
  ['undanganUrl', ['undangan link','undangan url','invitation link','invitation url']],
  ['undangan', ['undangan','invitation']],
  ['suratTugasUrl', ['surat tugas link','surat tugas url','assignment letter link','assignment letter url']],
  ['suratTugas', ['surat tugas','assignment letter']],
  ['kategori', ['kategori','jenis','category']],
  ['programTerkait', ['program terkait','program','related program']],
  ['tujuanOutput', ['tujuan','output','luaran','objective']],
  ['materi', ['materi','materials','material']],
  ['unitAsalNarsum', ['unit asal','narasumber','narsum','speaker home unit','speaker']],
  ['pesertaTarget', ['peserta target','target peserta','peserta','target participants']],
  ['picTimCM', ['pic tim cm','pic','penanggung jawab','cm team pic']],
  ['lokasiChannel', ['lokasi','channel','tempat','location']],
  ['estimasiBiaya', ['estimasi biaya','biaya','anggaran','budget','cost']],
  ['status', ['status','progres','capaian']],
  ['catatan', ['catatan','keterangan','follow up','notes','note']],
  ['no', ['no','nomor']],
];

function findHeaderRow(aoa) {
  const scanRows = Math.min(aoa.length, 12);
  for (let i = 0; i < scanRows; i++) {
    const row = (aoa[i] || []).map(c => String(c || '').toLowerCase());
    const rowStr = row.join('|');
    let hits = 0;
    ['kegiatan', 'kategori', 'status', 'tanggal', 'program', 'pic'].forEach(k => { if (rowStr.includes(k)) hits++; });
    if (hits >= 2) return i;
  }
  return 0;
}

function buildKeyMap(headerRow) {
  const headers = headerRow.map(h => String(h || '').toLowerCase().trim());
  const map = {};
  const usedCols = new Set();
  FIELD_MATCHERS.forEach(([field, patterns]) => {
    let bestCol = -1;
    for (let c = 0; c < headers.length; c++) {
      if (usedCols.has(c)) continue;
      if (patterns.some(p => headers[c].includes(p))) { bestCol = c; break; }
    }
    if (bestCol > -1) { map[field] = bestCol; usedCols.add(bestCol); }
  });
  return map;
}

function parseAnyDate(val) {
  if (val === null || val === undefined || val === '') return null;
  if (val instanceof Date) {
    // SheetJS (cellDates:true) always encodes parsed Excel dates using UTC
    // year/month/day components. Reading them back with LOCAL getters (via
    // dayjs(date).format()) shifts the date by a day for viewers whose
    // timezone offset pushes local midnight across the UTC day boundary.
    // Reading the UTC components directly sidesteps the viewer's timezone
    // entirely and always reproduces the exact calendar date from Excel.
    const y = val.getUTCFullYear();
    const m = String(val.getUTCMonth() + 1).padStart(2, '0');
    const d = String(val.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  if (typeof val === 'number') {
    try {
      const d = XLSX.SSF.parse_date_code(val);
      if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
    } catch (e) { /* ignore */ }
  }
  const str = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) return str.slice(0, 10);
  const dmy = str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
  if (dmy) return `${dmy[3]}-${String(dmy[2]).padStart(2,'0')}-${String(dmy[1]).padStart(2,'0')}`;
  const parsed = dayjs(str);
  if (parsed.isValid()) return parsed.format('YYYY-MM-DD');
  return null;
}
